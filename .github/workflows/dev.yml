name: Dev — Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "nginx/**"
      - "k8s/dev/**"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/nginx-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push (stable config, dev tag)
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          build-args: |
            BUILD_ENV=stable
            APP_VERSION=dev-${{ steps.sha.outputs.short }}
          tags: ${{ env.IMAGE }}:dev-${{ steps.sha.outputs.short }}

      - name: Deploy to dev cluster
        uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBECONFIG_DEV_B64 }}
        run: |
          kubectl apply -f k8s/dev/namespace.yaml
          kubectl set image deployment/nginx \
            nginx=${{ env.IMAGE }}:dev-${{ steps.sha.outputs.short }} \
            -n dev
          kubectl apply -f k8s/dev/deployment.yaml
          kubectl rollout status deployment/nginx -n dev --timeout=120s
