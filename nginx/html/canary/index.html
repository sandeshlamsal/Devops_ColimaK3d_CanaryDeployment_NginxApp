<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nginx — canary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 2px solid #f59e0b;
      border-radius: 12px;
      padding: 40px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 0 40px rgba(245, 158, 11, 0.15);
    }
    .badge {
      display: inline-block;
      background: #f59e0b;
      color: #0f172a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .variant { font-size: 1.1rem; color: #f59e0b; font-weight: 600; margin-bottom: 24px; }
    .meta { font-size: 0.85rem; color: #64748b; line-height: 1.8; }
    .meta span { color: #94a3b8; font-family: monospace; }
    .warning {
      margin-top: 24px;
      padding: 10px 16px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 6px;
      font-size: 0.78rem;
      color: #f59e0b;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">canary</div>
    <h1>nginx app</h1>
    <div class="variant">Canary Deployment</div>
    <div class="meta">
      Version: <span id="ver">loading...</span><br/>
      Variant: <span>canary</span><br/>
      Hostname: <span id="host">loading...</span>
    </div>
    <div class="warning">You are on the canary release — this version is under progressive rollout</div>
  </div>
  <script>
    fetch('/version').then(r => r.text()).then(t => {
      document.getElementById('ver').textContent = t.trim() || 'unknown';
    });
    document.getElementById('host').textContent = location.hostname;
  </script>
</body>
</html>
