server {
    listen 80;
    server_name _;

    # Expose stub_status for Prometheus nginx-exporter scraping
    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;   # K8s pod CIDR
        deny all;
    }

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /version {
        root /usr/share/nginx/html;
        try_files /version.txt =404;
        add_header X-Deployment-Variant "canary";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header X-Deployment-Variant "canary";
    }
}
