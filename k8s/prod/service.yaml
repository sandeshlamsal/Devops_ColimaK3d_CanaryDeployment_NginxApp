# Argo Rollouts with Istio requires two distinct Services.
# The controller patches selectors on these at runtime to point to the
# stable and canary ReplicaSets respectively.
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-stable
  namespace: prod
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-canary
  namespace: prod
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
