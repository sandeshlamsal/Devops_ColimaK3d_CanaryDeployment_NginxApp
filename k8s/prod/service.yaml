apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: prod
spec:
  # Selector matches both stable and canary pods by app label.
  # Argo Rollouts + Istio DestinationRule/VirtualService handle the
  # actual traffic split — this Service is the single stable host entry.
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
